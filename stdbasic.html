<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดเก็บข้อมูลนักเรียน</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts (Sarabun for Thai) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f4f8;
            color: #333;
        }
        /* Blue Theme Styles */
        .bg-primary-theme {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        .text-primary-theme {
            color: #1e3c72 !important;
        }
        .btn-primary-theme {
            background-color: #2a5298;
            border-color: #1e3c72;
            color: white;
            transition: all 0.3s;
        }
        .btn-primary-theme:hover {
            background-color: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            color: white;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #fff;
            border-bottom: 2px solid #e2e8f0;
            border-radius: 15px 15px 0 0 !important;
            padding: 15px 20px;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25);
        }
        /* Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .spinner-border {
            width: 3rem; height: 3rem;
            color: #2a5298;
        }
        
        /* Section transitions */
        .page-section {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .page-section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive tweaks สำหรับมือถือ */
        @media (max-width: 768px) {
            .card-header { padding: 12px 15px; }
            .card-body { padding: 15px; }
            h5 { font-size: 1.1rem; }
            .btn-lg { padding: 10px 20px; font-size: 1rem; w-100; display: block; }
            .navbar-brand { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- Loading Spinner -->
    <div id="loader" style="display: none;">
        <div class="spinner-border" role="status"></div>
        <h5 class="mt-3 text-primary-theme fw-bold">กำลังประมวลผล...</h5>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="page-section active container">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-11 col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-graduate fa-4x text-primary-theme mb-3"></i>
                            <h3 class="fw-bold text-primary-theme">ระบบข้อมูลนักเรียน</h3>
                            <p class="text-muted">เข้าสู่ระบบเพื่อจัดการข้อมูลส่วนตัว</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">รหัสประจำตัวนักเรียน (Username)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                    <input type="text" class="form-control" id="username" placeholder="กรอกรหัสนักเรียน" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">รหัสผ่าน (Password)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน" required>
                                </div>
                                <div class="form-text mt-2"><i class="fas fa-info-circle"></i> ตรวจสอบข้อมูลผู้ใช้จากฐานข้อมูลของโรงเรียน</div>
                            </div>
                            <button type="submit" class="btn btn-primary-theme w-100 py-2 fw-bold">
                                <i class="fas fa-sign-in-alt me-2"></i> เข้าสู่ระบบ
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard / Form Page -->
    <div id="dashboard-page" class="page-section">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary-theme shadow-sm mb-4">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#"><i class="fas fa-school me-2"></i>ระบบประวัตินักเรียน</a>
                <!-- แก้ไขส่วนนี้ให้แสดงผลบนมือถือได้ (เอา d-none d-md-inline ออก) -->
                <div class="d-flex align-items-center">
                    <span class="text-white me-2 mb-0 small text-truncate" style="max-width: 180px;" id="display-user-id">ผู้ใช้งาน: -</span>
                    <button class="btn btn-outline-light btn-sm text-nowrap" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i> ออกจากระบบ
                    </button>
                </div>
            </div>
        </nav>

        <div class="container pb-5">
            <form id="studentForm">
                <div class="row">
                    <!-- ข้อมูลส่วนตัว -->
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-header d-flex align-items-center">
                                <i class="fas fa-user-circle fa-lg text-primary-theme me-2"></i>
                                <h5 class="mb-0 fw-bold text-primary-theme">1. ข้อมูลส่วนตัว</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <!-- เพิ่มส่วนอัปโหลดรูปโปรไฟล์ตรงนี้ -->
                                    <div class="col-12 text-center mb-3">
                                        <div class="position-relative d-inline-block">
                                            <img id="profilePreview" src="https://ui-avatars.com/api/?name=Student&background=random&size=150" alt="Profile" class="rounded-circle img-thumbnail" style="width: 120px; height: 120px; object-fit: cover;">
                                            <label for="profilePic" class="position-absolute bottom-0 end-0 btn btn-primary-theme btn-sm rounded-circle" style="transform: translate(10%, 10%); cursor: pointer;">
                                                <i class="fas fa-camera"></i>
                                            </label>
                                            <input type="file" id="profilePic" class="d-none" accept="image/*">
                                        </div>
                                        <div class="form-text mt-1">อัปโหลดรูปถ่ายหน้าตรง (ไม่เกิน 2MB)</div>
                                    </div>
                                    <div class="col-12 col-md-2">
                                        <label class="form-label">คำนำหน้า</label>
                                        <select class="form-select" id="prefix" required>
                                            <option value="">เลือก...</option>
                                            <option value="ด.ช.">ด.ช.</option>
                                            <option value="ด.ญ.">ด.ญ.</option>
                                            <option value="นาย">นาย</option>
                                            <option value="นางสาว">นางสาว</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-5">
                                        <label class="form-label">ชื่อ</label>
                                        <input type="text" class="form-control" id="firstName" required>
                                    </div>
                                    <div class="col-12 col-md-5">
                                        <label class="form-label">นามสกุล</label>
                                        <input type="text" class="form-control" id="lastName" required>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">วัน/เดือน/ปีเกิด</label>
                                        <input type="date" class="form-control" id="dob" required>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">เบอร์โทรศัพท์นักเรียน</label>
                                        <input type="tel" class="form-control" id="studentPhone" placeholder="08xxxxxxxx">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ที่อยู่ปัจจุบัน -->
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-header d-flex align-items-center">
                                <i class="fas fa-home fa-lg text-primary-theme me-2"></i>
                                <h5 class="mb-0 fw-bold text-primary-theme">2. ที่อยู่ปัจจุบัน</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-12 col-md-3">
                                        <label class="form-label">บ้านเลขที่</label>
                                        <input type="text" class="form-control" id="addressNo" required>
                                    </div>
                                    <div class="col-12 col-md-3">
                                        <label class="form-label">หมู่ที่</label>
                                        <input type="text" class="form-control" id="addressMoo">
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">ตำบล</label>
                                        <input type="text" class="form-control" id="addressSubDist" required>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">อำเภอ</label>
                                        <input type="text" class="form-control" id="addressDist" required>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">จังหวัด</label>
                                        <input type="text" class="form-control" id="addressProv" required>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">รหัสไปรษณีย์</label>
                                        <input type="text" class="form-control" id="addressZip" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ข้อมูลครอบครัว -->
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-header d-flex align-items-center">
                                <i class="fas fa-users fa-lg text-primary-theme me-2"></i>
                                <h5 class="mb-0 fw-bold text-primary-theme">3. ข้อมูลครอบครัวและผู้ปกครอง</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">ชื่อ-นามสกุล ผู้ปกครอง</label>
                                        <input type="text" class="form-control" id="parentName" required>
                                    </div>
                                    <div class="col-12 col-md-3">
                                        <label class="form-label">เกี่ยวข้องเป็น</label>
                                        <select class="form-select" id="parentRelation" required>
                                            <option value="">เลือก...</option>
                                            <option value="พ่อ">พ่อ</option>
                                            <option value="แม่">แม่</option>
                                            <option value="ป้า">ป้า</option>
                                            <option value="ลุง">ลุง</option>
                                            <option value="น้า">น้า</option>
                                            <option value="อา">อา</option>
                                            <option value="ตา">ตา</option>
                                            <option value="ยาย">ยาย</option>
                                            <option value="อื่นๆ">อื่นๆ</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-3">
                                        <label class="form-label">เบอร์โทรผู้ปกครอง</label>
                                        <input type="tel" class="form-control" id="parentPhone" required>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">สถานะครอบครัว</label>
                                        <select class="form-select" id="familyStatus" required>
                                            <option value="">เลือก...</option>
                                            <option value="พ่อแม่อยู่ด้วยกัน">พ่อแม่อยู่ด้วยกัน</option>
                                            <option value="แยกทางกัน">แยกทางกัน</option>
                                            <option value="หย่าร้าง">หย่าร้าง</option>
                                            <option value="บิดา/มารดาเสียชีวิต">บิดา/มารดาเสียชีวิต</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">รายได้ของครอบครัว/เดือน (บาท)</label>
                                        <input type="number" class="form-control" id="familyIncome" placeholder="เช่น 15000">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ข้อมูลการเดินทางและความสามารถ -->
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-header d-flex align-items-center">
                                <i class="fas fa-bicycle fa-lg text-primary-theme me-2"></i>
                                <h5 class="mb-0 fw-bold text-primary-theme">4. ข้อมูลอื่นๆ</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">ได้เงินมาโรงเรียนวันละ (บาท)</label>
                                        <input type="number" class="form-control" id="allowance">
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">มาโรงเรียนอย่างไร</label>
                                        <select class="form-select" id="commuteMethod" required>
                                            <option value="">เลือก...</option>
                                            <option value="เดิน">เดิน</option>
                                            <option value="รถจักรยาน">รถจักรยาน</option>
                                            <option value="รถมอเตอร์ไซต์">รถมอเตอร์ไซต์</option>
                                            <option value="ผู้ปกครองมาส่ง">ผู้ปกครองมาส่ง</option>
                                            <option value="รถรับส่งโรงเรียน">รถรับส่งโรงเรียน</option>
                                            <option value="รถโดยสารประจำทาง">รถโดยสารประจำทาง</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">ระยะทางจากบ้านถึงโรงเรียน (กิโลเมตร)</label>
                                        <input type="number" step="0.1" class="form-control" id="distance">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">นักเรียนมีความสามารถพิเศษด้านใด (เช่น ดนตรี กีฬา เทคโนโลยี)</label>
                                        <textarea class="form-control" id="specialSkills" rows="2"></textarea>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">ความคาดหวังของนักเรียนเมื่อเรียนจบ</label>
                                        <textarea class="form-control" id="expectations" rows="2"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="col-12 text-center mt-3">
                        <button type="button" class="btn btn-primary-theme btn-lg px-5 w-100 w-md-auto" onclick="saveData()">
                            <i class="fas fa-save me-2"></i> บันทึกข้อมูล
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // === การตั้งค่า Google Apps Script Web App URL ===
        // นำ URL ที่ได้จากการ Deploy Google Apps Script มาใส่ในช่องว่างด้านล่างนี้
        const GAS_URL = 'https://script.google.com/macros/s/AKfycby6IrECF84R5zFCiJfFnyPb-jOabcfvCjA9EWyvW1t7_CYUWYZyD6mmReFpwCzeBzWxzg/exec'; 
        
        let currentStudentId = '';
        let mockStorage = {}; // ใช้สำหรับจำลองระบบกรณีที่ยังไม่ได้ใส่ GAS_URL
        let currentProfileBase64 = ''; // เพิ่มตัวแปรเก็บรูปภาพ

        // ฟังก์ชันเข้าสู่ระบบ (อัปเดตเพื่อตรวจสอบกับ Google Sheet พร้อมดึงข้อมูลผู้ใช้)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(!user || !pass) return;

            showLoader();

            // กรณีที่ยังไม่ได้เชื่อมต่อ Google Sheet ให้จำลองการล็อกอิน
            if(!GAS_URL) {
                setTimeout(() => {
                    hideLoader();
                    if(user === pass) { // จำลองโหมดทดสอบ ให้กรอกรหัสผ่านเดียวกับรหัสผู้ใช้งาน
                        currentStudentId = user;
                        
                        // จำลองการดึงข้อมูลพื้นฐานมาแสดง
                        document.getElementById('prefix').value = 'ด.ช.';
                        document.getElementById('firstName').value = 'สมมติ';
                        document.getElementById('lastName').value = 'ทดสอบระบบ';

                        document.getElementById('display-user-id').innerText = `ผู้ใช้งาน: ${currentStudentId} สมมติ ทดสอบระบบ`;

                        document.getElementById('login-page').classList.remove('active');
                        document.getElementById('dashboard-page').classList.add('active');
                        fetchData(currentStudentId);
                    } else {
                        Swal.fire('ข้อผิดพลาด!', 'รหัสประจำตัวหรือรหัสผ่านไม่ถูกต้อง (โหมดทดลอง: กรอกให้เหมือนกันทั้งคู่)', 'error');
                    }
                }, 800);
                return;
            }

            // ถ้ามี GAS_URL ให้ส่งไปตรวจสอบที่ Google Sheet
            try {
                let formData = new URLSearchParams();
                formData.append('action', 'login');
                formData.append('username', user);
                formData.append('password', pass);

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                hideLoader();

                if(result.status === 'success') {
                    currentStudentId = user;

                    // นำข้อมูลที่ได้จาก Sheet Users มาใส่ในฟอร์มล่วงหน้า
                    if (result.userData) {
                        document.getElementById('prefix').value = result.userData.prefix || '';
                        document.getElementById('firstName').value = result.userData.firstName || '';
                        document.getElementById('lastName').value = result.userData.lastName || '';
                    }

                    let dFName = result.userData && result.userData.firstName ? result.userData.firstName : '';
                    let dLName = result.userData && result.userData.lastName ? result.userData.lastName : '';
                    document.getElementById('display-user-id').innerText = `ผู้ใช้งาน: ${currentStudentId} ${dFName} ${dLName}`.trim();
                    
                    document.getElementById('login-page').classList.remove('active');
                    document.getElementById('dashboard-page').classList.add('active');
                    
                    // เมื่อล็อกอินผ่าน ให้ดึงข้อมูลประวัติเดิมมาแสดงด้วย (ถ้าเคยบันทึกแล้วจะเขียนทับข้อมูลพื้นฐาน)
                    fetchData(currentStudentId);
                } else {
                    Swal.fire('การเข้าสู่ระบบล้มเหลว', 'รหัสประจำตัวหรือรหัสผ่านไม่ถูกต้อง', 'error');
                }
            } catch (error) {
                hideLoader();
                console.error('Error:', error);
                Swal.fire('ข้อผิดพลาด!', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        });

        // จัดการอัปโหลดรูปภาพ
        document.getElementById('profilePic').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // ตรวจสอบขนาดไฟล์ (ไม่เกิน 2MB)
            if (file.size > 2 * 1024 * 1024) {
                Swal.fire('ขนาดไฟล์ใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 2MB', 'warning');
                e.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('profilePreview').src = event.target.result;
                currentProfileBase64 = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ฟังก์ชันออกจากระบบ
        function logout() {
            Swal.fire({
                title: 'ยืนยันการออกจากระบบ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2a5298',
                cancelButtonColor: '#d33',
                confirmButtonText: 'ใช่, ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    currentStudentId = '';
                    currentProfileBase64 = ''; // เคลียร์รูปภาพ
                    document.getElementById('profilePreview').src = 'https://ui-avatars.com/api/?name=Student&background=random&size=150';
                    document.getElementById('studentForm').reset();
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                    
                    document.getElementById('display-user-id').innerText = 'ผู้ใช้งาน: -';
                    
                    document.getElementById('dashboard-page').classList.remove('active');
                    document.getElementById('login-page').classList.add('active');
                }
            });
        }

        // ฟังก์ชันดึงข้อมูลจาก Google Sheet
        async function fetchData(studentId) {
            showLoader();
            
            // กรณีที่ยังไม่ได้เชื่อมต่อ Google Sheet (จำลองข้อมูล)
            if(!GAS_URL) {
                setTimeout(() => {
                    hideLoader();
                    if(mockStorage[studentId]) {
                        populateForm(mockStorage[studentId]);
                        Swal.fire('โหลดข้อมูลสำเร็จ', 'ดึงข้อมูลที่เคยบันทึกไว้เรียบร้อยแล้ว', 'success');
                    } else {
                        Swal.fire('ยินดีต้อนรับ', 'กรุณากรอกข้อมูลส่วนตัวเพิ่มเติมให้ครบถ้วน', 'info');
                    }
                }, 800);
                return;
            }

            try {
                // ส่ง Request แบบ GET หรือ POST ไปยัง GAS (ในตัวอย่างใช้ POST แบบ urlencoded เพื่อป้องกัน CORS)
                let formData = new URLSearchParams();
                formData.append('action', 'getData');
                formData.append('studentId', studentId);

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if(result.status === 'success' && result.data) {
                    populateForm(result.data); // ดึงข้อมูลเต็มมาเขียนทับ
                    
                    // เพิ่มการอัปเดตชื่อผู้ใช้บนแถบ Navbar อีกรอบ (ใช้ข้อมูลล่าสุดจากฐานข้อมูลหลัก)
                    let dFName = result.data.firstName || document.getElementById('firstName').value || '';
                    let dLName = result.data.lastName || document.getElementById('lastName').value || '';
                    document.getElementById('display-user-id').innerText = `ผู้ใช้งาน: ${currentStudentId} ${dFName} ${dLName}`.trim();

                    Swal.fire('เข้าสู่ระบบสำเร็จ', 'ระบบได้ดึงข้อมูลส่วนตัวของคุณขึ้นมาแล้ว', 'success');
                } else {
                    Swal.fire('เข้าสู่ระบบสำเร็จ', 'ระบบได้ดึงข้อมูลพื้นฐานมาให้แล้ว กรุณากรอกข้อมูลส่วนอื่นให้ครบถ้วน', 'info');
                }
            } catch (error) {
                console.error('Error:', error);
                // ไม่แจ้ง Error น่ารำคาญ หากไม่พบข้อมูล ให้ผู้ใช้กรอกใหม่
            } finally {
                hideLoader();
            }
        }

        // ฟังก์ชันบันทึกข้อมูลไปยัง Google Sheet
        async function saveData() {
            // ตรวจสอบความถูกต้องของแบบฟอร์มเบื้องต้น
            const form = document.getElementById('studentForm');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // รวบรวมข้อมูล
            const studentData = {
                studentId: currentStudentId,
                profilePic: currentProfileBase64,
                prefix: document.getElementById('prefix').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                dob: document.getElementById('dob').value,
                addressNo: document.getElementById('addressNo').value,
                addressMoo: document.getElementById('addressMoo').value,
                addressSubDist: document.getElementById('addressSubDist').value,
                addressDist: document.getElementById('addressDist').value,
                addressProv: document.getElementById('addressProv').value,
                addressZip: document.getElementById('addressZip').value,
                studentPhone: document.getElementById('studentPhone').value,
                parentName: document.getElementById('parentName').value,
                parentRelation: document.getElementById('parentRelation').value,
                parentPhone: document.getElementById('parentPhone').value,
                familyStatus: document.getElementById('familyStatus').value,
                familyIncome: document.getElementById('familyIncome').value,
                allowance: document.getElementById('allowance').value,
                commuteMethod: document.getElementById('commuteMethod').value,
                distance: document.getElementById('distance').value,
                specialSkills: document.getElementById('specialSkills').value,
                expectations: document.getElementById('expectations').value
            };

            showLoader();

            // กรณีไม่มี Google Sheet URL ให้บันทึกลงตัวแปรจำลอง
            if(!GAS_URL) {
                setTimeout(() => {
                    mockStorage[currentStudentId] = studentData;
                    document.getElementById('display-user-id').innerText = `ผู้ใช้งาน: ${currentStudentId} ${studentData.firstName} ${studentData.lastName}`;
                    hideLoader();
                    Swal.fire({
                        title: 'บันทึกข้อมูลสำเร็จ!',
                        text: '(นี่เป็นการจำลองเนื่องจากยังไม่ได้ใส่ Google Script URL)',
                        icon: 'success',
                        confirmButtonColor: '#2a5298'
                    });
                }, 1000);
                return;
            }

            // ส่งข้อมูลไปยัง Google Sheet
            try {
                let formData = new URLSearchParams();
                formData.append('action', 'saveData');
                formData.append('data', JSON.stringify(studentData));

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                hideLoader();
                
                if(result.status === 'success') {
                    // อัปเดตชื่อผู้ใช้บน Navbar เมื่อบันทึกสำเร็จ
                    document.getElementById('display-user-id').innerText = `ผู้ใช้งาน: ${currentStudentId} ${studentData.firstName} ${studentData.lastName}`.trim();
                    
                    Swal.fire({
                        title: 'บันทึกข้อมูลสำเร็จ!',
                        text: 'ข้อมูลของคุณถูกบันทึกลงในฐานข้อมูลเรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#2a5298'
                    });
                } else {
                    Swal.fire('ข้อผิดพลาด!', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                }
            } catch (error) {
                hideLoader();
                console.error('Error:', error);
                Swal.fire('ข้อผิดพลาด!', 'เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์', 'error');
            }
        }

        // ฟังก์ชันนำข้อมูลมาใส่ในฟอร์ม
        function populateForm(data) {
            Object.keys(data).forEach(key => {
                const element = document.getElementById(key);
                if(element && key !== 'profilePic') {
                    element.value = data[key];
                }
            });
            
            // จัดการแสดงผลรูปภาพ
            if(data.profilePic && data.profilePic !== "") {
                document.getElementById('profilePreview').src = data.profilePic;
                currentProfileBase64 = data.profilePic;
            } else {
                document.getElementById('profilePreview').src = 'https://ui-avatars.com/api/?name=Student&background=random&size=150';
                currentProfileBase64 = '';
            }
        }

        function showLoader() { document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }
    </script>
</body>
</html>
